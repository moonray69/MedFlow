services:
  db:
    image: postgres:15-alpine
    container_name: medflow_db
    environment:
      POSTGRES_USER: helsi_user
      POSTGRES_PASSWORD: helsi_password
      POSTGRES_DB: medflow_database
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helsi_user -d medflow_database"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: medflow_web
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://helsi_user:helsi_password@db:5432/medflow_database
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: